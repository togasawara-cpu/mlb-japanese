<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLB日本人選手 前日成績</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2330;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --win: #3fb950;
    --loss: #f85149;
    --save: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
                 "Yu Gothic UI", "Meiryo", sans-serif;
    line-height: 1.6;
  }
  header.site {
    padding: 24px 16px 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header.site h1 {
    margin: 0 0 4px;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
  }
  header.site .date {
    color: var(--accent);
    font-weight: 600;
  }
  header.site .updated {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-top: 4px;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    gap: 14px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: background 0.2s;
  }
  .card:hover { background: var(--bg-card-hover); }
  .card-head h2 {
    margin: 0 0 4px;
    font-size: 1.15rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .meta { color: var(--text-dim); font-size: 0.85rem; }
  .opp { color: var(--accent); font-size: 0.95rem; margin-top: 2px; }
  .card-body {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .stat-row {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    gap: 6px 10px;
    align-items: baseline;
    padding: 4px 0;
  }
  .stat-label { color: var(--text-dim); font-size: 0.85rem; }
  .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .season {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .season strong { color: var(--text); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .badge.win { background: var(--win); color: #061a0a; }
  .badge.loss { background: var(--loss); color: #1a0606; }
  .badge.save { background: var(--save); color: #1a1306; }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 32px 16px;
  }
  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.75rem;
    padding: 24px 16px 32px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  @media (max-width: 480px) {
    .stat-row { grid-template-columns: auto 1fr auto 1fr; gap: 4px 8px; }
    .card { padding: 14px; }
  }
</style>
</head>
<body>
  <header class="site">
    <h1>⚾ MLB日本人選手 前日の成績</h1>
    <div class="date">2026年04月30日</div>
    <div class="updated">2026年05月01日 23:30 更新</div>
  </header>
  <main>
    <p class="empty">本日対象の試合・出場選手はいません。</p>
  </main>
  <footer>
    Data: <a href="https://statsapi.mlb.com" target="_blank" rel="noopener">MLB Stats API</a>
  </footer>
</body>
</html>
