name: MLB Stats Update

on:
  schedule:
    # 毎日 UTC 21:00 = JST 06:00 に実行
    - cron: '0 21 * * *'
  workflow_dispatch:  # GitHub UI から手動実行可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch stats and generate HTML
        run: python scripts/fetch_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html stats_data.json highlights.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update MLB stats $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
